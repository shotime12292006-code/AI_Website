<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>自己紹介</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="profile">
      <section class="intro" aria-labelledby="profile-name">
        <div class="avatar" aria-hidden="true">A</div>
        <p class="eyebrow">Profile</p>
        <h1 id="profile-name">あなたの名前</h1>
        <p class="lead">
          ここに短い自己紹介を書きます。好きなこと、得意なこと、いま取り組んでいることを
          1〜2文でまとめると読みやすくなります。
        </p>

        <div class="details">
          <div>
            <span>出身</span>
            <strong>東京都</strong>
          </div>
          <div>
            <span>好きなこと</span>
            <strong>Web制作 / 音楽 / 読書</strong>
          </div>
          <div>
            <span>目標</span>
            <strong>見やすいサイトを作る</strong>
          </div>
        </div>

        <a class="button" href="mailto:your-email@example.com">メールする</a>
      </section>
    </main>
  </body>
</html>
